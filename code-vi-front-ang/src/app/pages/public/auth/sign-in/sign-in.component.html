<app-toast [message]="errorMessage"></app-toast>

<div class="my-10 space-y-6">
  <div class="text-center">
    <h2 class="mb-1 text-3xl font-semibold text-foreground">Hello Again <span class="text-primary">!</span></h2>
    <p class="text-sm text-muted-foreground">Enter your credential to access your account.</p>
  </div>

  <!-- Oauth 2.0 Google -->
  <div>
    <app-button (click)="onGoogleSignIn()" full impact="bold" tone="light" shape="rounded" size="medium">
      <svg-icon src="assets/icons/google-logo.svg" [svgClass]="'h-6 w-6 mr-2'"> </svg-icon>
      Sign In with Google
    </app-button>
  </div>
  
  <div
    class="my-4 flex items-center before:mt-0.5 before:flex-1 before:border-t before:border-muted after:mt-0.5 after:flex-1 after:border-t after:border-muted">
    <p class="mx-4 mb-0 text-center text-sm text-muted-foreground">or</p>
  </div>

  <form [formGroup]="signInForm" (ngSubmit)="onSignIn()">
    <div class="space-y-3 text-left">
      <div class="form__group">
        <div class="relative">
          <input type="text" id="email" formControlName="email" #emailInput class="peer block" placeholder=" " />
          <label for="email" class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
            Email address
          </label>
        </div>
      </div>

      <div class="relative">
        <input type="password" id="password" formControlName="password" class="peer block" placeholder=" " />
        <label for="password" class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
          Password
        </label>
        <span class="absolute top-2.5 right-5 cursor-pointer text-muted-foreground">
          <svg-icon src="assets/icons/heroicons/outline/eye-off.svg" [svgClass]="'h-5 w-5'"></svg-icon>
          <svg-icon src="assets/icons/heroicons/outline/eye.svg" [svgClass]="'h-5 w-5 hidden'"></svg-icon>
        </span>
      </div>

      <div class="mb-2 flex items-center justify-between space-x-3">
        <div class="flex items-center">
          <input id="remember-me" name="remember-me" type="checkbox" formControlName="rememberMe" />
          <label for="remember-me" class="ml-2 block text-sm text-muted-foreground"> Remember me </label>
        </div>
      </div>

      <div>
        <app-button full impact="bold" tone="primary" shape="rounded" size="medium">Sign in</app-button>
      </div>
    </div>
  </form>

  <div class="flex items-center text-sm text-muted-foreground">
    Forgot your password?
    <app-button routerLink="/auth/forgot-password" impact="none" tone="primary" shape="rounded" size="small">
      Find password
    </app-button>
  </div>

  <div class="flex items-center text-sm text-muted-foreground">
    Not a Member yet?
    <app-button impact="none" tone="primary" shape="rounded" size="small">
      <a href="/auth/sign-up" style="display: block; width: 100%; height: 100%; text-decoration: none; color: inherit;">
        Sign up
      </a>
    </app-button>
  </div>
</div>
