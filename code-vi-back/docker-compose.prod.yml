version: "3.8"

networks:
  codevi-backend-net:
    driver: bridge
  shared-net:
    external: true
    name: shared-net

# кіөнҶө м„Өм • (YAML anchor)
x-common-backend: &common-backend
  networks:
    - codevi-backend-net
    - shared-net
  depends_on:
    - db
  restart: always

x-common-env: &common-env
  SERVER_HOST: ${SERVER_HOST}
  SONAR_TOKEN: ${SONAR_TOKEN}
  NODE_ENV: production
  DATABASE_HOST: ${DATABASE_HOST:-codevi-db}
  DATABASE_PORT: 3306
  DATABASE_NAME: ${DATABASE_NAME:-codevi}
  DATABASE_USERNAME: ${DATABASE_USERNAME:-jaehokim}
  DATABASE_PASSWORD: ${USER_DB_PASSWORD}
  JWT_SECRET: ${JWT_SECRET}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
  GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY}
  TZ: Asia/Seoul
  AUTH_BEARER_TOKEN: ${BACKEND_AUTH_TOKEN}
  DEPLOY_FRONTEND_URL1: ${DEPLOY_FRONTEND_URL1}
  DEPLOY_FRONTEND_URL2: ${DEPLOY_FRONTEND_URL2}
  DEPLOY_FRONTEND_URL3: ${DEPLOY_FRONTEND_URL3}
  DEPLOY_FRONTEND_URL4: ${DEPLOY_FRONTEND_URL4}
  DEPLOY_FRONTEND_URL5: ${DEPLOY_FRONTEND_URL5}
  DEPLOY_FRONTEND_URL6: ${DEPLOY_FRONTEND_URL6}

services:
  # нҶөн•© л°ұм—”л“ң (нҸ¬нҠё 13000) - Relational AST (DirectoryвҶ’FileвҶ’ClassвҶ’Function) м ҖмһҘ
  backend:
    build: .
    container_name: codevi-backend
    <<: *common-backend
    environment:
      <<: *common-env
      SERVER_PORT: "13000"
    ports:
      - "13000:13000"

  # ======================================================================
  # [LEGACY] м•„лһҳ м„ңл№„мҠӨл“ӨмқҖ л№„нҷңм„ұнҷ”лҗЁ.
  # м¶”нӣ„ HDD лі„лҸ„ м ҖмһҘ м•„нӮӨн…ҚмІҳлЎң м „нҷҳ мӢң мһ¬нҷңмҡ© мҳҲм •.
  # л№„нҷңм„ұнҷ” мқјмһҗ: 2026-03-20
  # ======================================================================
  #
  # # V1: Relational AST (нҸ¬нҠё 13001) - DirectoryвҶ’FileвҶ’ClassвҶ’Function м •к·ңнҷ” м ҖмһҘ
  # backend-relational:
  #   build: .
  #   container_name: codevi-backend-relational
  #   <<: *common-backend
  #   environment:
  #     <<: *common-env
  #     ENTRY_FILE: main-relational
  #     RELATIONAL_PORT: "13001"
  #   ports:
  #     - "13001:13001"
  #
  # # V2: JSON AST (нҸ¬нҠё 13002) - ASTлҘј @Column('json')м—җ нҶөм§ё м ҖмһҘ
  # backend-json:
  #   build: .
  #   container_name: codevi-backend-json
  #   <<: *common-backend
  #   environment:
  #     <<: *common-env
  #     ENTRY_FILE: main-json
  #     JSON_PORT: "13002"
  #   ports:
  #     - "13002:13002"

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: codevi-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DATABASE_NAME:-codevi}
      - MYSQL_USER=${DATABASE_USERNAME:-jaehokim}
      - MYSQL_PASSWORD=${USER_DB_PASSWORD}
    ports:
      - "13306:3306"
    networks:
      - codevi-backend-net
      - shared-net
    volumes:
      - codevi-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  codevi-mysql-data: